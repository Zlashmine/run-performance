services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: activity_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - backend
    environment:
      - RUST_LOG=info
      # Secrets should be injected here (or via a .env file local to docker-compose,
      # NOT copied into the image). Example:
      # DATABASE_URL=postgres://postgres:password@db:5432/activity_db
      # CORS_ORIGINS=https://app.example.com

volumes:
  db_data:
networks:
  backend:
    driver: bridge